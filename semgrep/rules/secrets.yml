rules:

  - id: hardcoded-password
    languages:
      - generic
    message: "Do not hardcode passwords. Use environment variables or secret management."
    severity: ERROR
    pattern-regex: |
      (?i)(password|passwd|pwd)\s*[:=]\s*["'][^"']{4,}["']

  - id: hardcoded-api-token
    languages:
      - generic
    message: "Do not commit API tokens or secrets."
    severity: ERROR
    pattern-regex: |
      (?i)(api[_-]?key|api[_-]?token|secret|access[_-]?token|auth[_-]?token)\s*[:=]\s*["'][A-Za-z0-9_\-\.]{16,}["']

  - id: hardcoded-jwt
    languages:
      - generic
    message: "JWT tokens should not be committed."
    severity: ERROR
    pattern-regex: |
      eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}

  - id: database-url-with-password
    languages:
      - generic
    message: "Database connection strings with credentials must not be committed."
    severity: ERROR
    pattern-regex: |
      (?i)(postgres|postgresql|mysql|mongodb)://[^:]+:[^@]+@

  - id: private-key
    languages:
      - generic
    message: "Private keys must never be committed."
    severity: ERROR
    pattern-regex: |
      -----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----

  - id: bearer-token
    languages:
      - generic
    message: "Bearer tokens must not be committed."
    severity: ERROR
    pattern-regex: |
      (?i)bearer\s+[A-Za-z0-9\-_\.]{20,}

  - id: aws-access-key
    languages:
      - generic
    message: "AWS access keys must not be committed."
    severity: ERROR
    pattern-regex: |
      AKIA[0-9A-Z]{16}