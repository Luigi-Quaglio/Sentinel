rules:
  - id: no-console-log
    message: "Do not use console.log/debug/trace directly. Use the project logger."
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: console.log(...)
          - pattern: console.debug(...)
          - pattern: console.trace(...)
    paths:
      exclude:
        - scripts/**
        - "**/*.spec.ts"
        - "**/*.test.ts"

  - id: no-debugger
    message: "Remove debugger statements before committing."
    severity: ERROR
    languages: [javascript, typescript]
    pattern: debugger
    paths:
      exclude:
        - scripts/**
        - "**/*.spec.ts"
        - "**/*.test.ts"

  - id: no-process-env-outside-config
    message: "Access environment variables only through the centralized config layer."
    severity: WARNING
    languages: [javascript, typescript]
    pattern: process.env.$VAR
    paths:
      include:
        - services/src/**/*.ts
      exclude:
        - services/src/config/**
        - services/src/main.ts
        - services/src/prismaClient.ts
        - "**/*.spec.ts"
        - "**/*.test.ts"

  - id: no-direct-prisma-outside-repository
    message: "Use repositories for Prisma access. Do not import prisma directly outside repository files."
    severity: ERROR
    languages: [typescript]
    pattern-either:
      - pattern: import prisma from "../prismaClient"
      - pattern: import prisma from "./prismaClient"
      - pattern: import prisma from "../../prismaClient"
      - pattern: import prisma from "../../../prismaClient"
      - pattern: import prisma from "../../../../prismaClient"
    paths:
      include:
        - services/src/**/*.ts
      exclude:
        - services/src/repositories/**
        - services/src/prismaClient.ts
        - "**/*.spec.ts"
        - "**/*.test.ts"

  - id: no-new-prisma-client-outside-infra
    message: "Do not instantiate PrismaClient outside the database/infra layer."
    severity: ERROR
    languages: [typescript]
    pattern: new PrismaClient(...)
    paths:
      include:
        - services/src/**/*.ts
      exclude:
        - services/src/prismaClient.ts
        - services/src/repositories/**
        - "**/*.spec.ts"
        - "**/*.test.ts"

  - id: no-prisma-client-import-outside-infra
    message: "Do not import PrismaClient directly outside the database/infra layer."
    severity: ERROR
    languages: [typescript]
    pattern: import { PrismaClient } from "@prisma/client"
    paths:
      include:
        - services/src/**/*.ts
      exclude:
        - services/src/prismaClient.ts
        - services/src/repositories/**
        - "**/*.spec.ts"
        - "**/*.test.ts"

  - id: no-hardcoded-http-exception-message
    message: "Avoid hardcoded user-facing exception messages. Prefer i18n/message keys."
    severity: WARNING
    languages: [typescript]
    patterns:
      - pattern-either:
          - pattern: throw new BadRequestException("...")
          - pattern: throw new UnauthorizedException("...")
          - pattern: throw new ForbiddenException("...")
          - pattern: throw new NotFoundException("...")
          - pattern: throw new ConflictException("...")
          - pattern: throw new UnprocessableEntityException("...")
    paths:
      include:
        - services/src/**/*.ts
      exclude:
        - services/src/i18n/**
        - "**/*.spec.ts"
        - "**/*.test.ts"