services:
  db:
    image: postgres:16
    container_name: sentinel_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Sao_Paulo
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/initdb:/docker-entrypoint-initdb.d
    networks:
      - sentinel_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: sentinel_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sentinel_net

  mqtt:
    image: eclipse-mosquitto:2
    container_name: sentinel_mqtt
    restart: unless-stopped
    ports:
      - "${MQTT_PORT}:1883"
      - "${MQTT_WS_PORT}:9001"
    volumes:
      - ../mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ../mqtt/data:/mosquitto/data
      - ../mqtt/log:/mosquitto/log
    networks:
      - sentinel_net

  backend:
    build:
      context: ../../api/services
      dockerfile: Dockerfile
    container_name: sentinel_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:3000"
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    networks:
      - sentinel_net
    volumes:
      - ../../api/services:/app
      - /app/node_modules

  frontend:
    build:
      context: ../../app
      dockerfile: Dockerfile
    container_name: sentinel_frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:3001"
    depends_on:
      - backend
    networks:
      - sentinel_net
    volumes:
      - ../../app:/app
      - /app/node_modules

volumes:
  postgres_data:

networks:
  sentinel_net:
    driver: bridge